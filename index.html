    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Responsive Mobile Container Layout */
        .app-container {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Desktop testing wrapper fallback rule */
        @media (min-width: 480px) {
            .app-container {
                width: 100%;
                max-width: 420px;
                height: 88vh;
                min-height: 650px;
                border-radius: 36px;
                border: 8px solid #1a1a1a;
                box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            }
            body {
                background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            }
        }

        /* Live Camera Background Elements */
        .camera-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* Mirror effect applied only when using front camera */
        .camera-bg.facing-user {
            transform: scaleX(-1);
        }

        /* Top Bar: Creator Info styled after the left phone in image_2125eb.png */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 8px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            padding-top: calc(env(safe-area-inset-top, 16px) + 4px); /* Adapts automatically around phone notches */
        }

        .creator-badge {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 4px 12px 4px 6px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .creator-avatar {
            width: 28px;
            height: 28px;
            background-color: #fe2c55;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .creator-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
        }

        .viewer-count {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .follow-btn {
            background-color: #fe2c55;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 4px;
        }

        .right-badges {
            display: flex;
            gap: 6px;
        }

        .tag-badge {
            background-color: rgba(0, 0, 0, 0.4);
            color: #fbd433;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Transparent Floating Chat Container Window */
        .stream-viewport {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 8px;
            z-index: 5;
        }

        /* Shifted completely to the left and styled like TikTok */
        .chat-container {
            max-height: 240px;
            width: 85%;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 0px;
        }

        /* Compact Layout: Stacking Username Over Text without PFP */
        .chat-line {
            display: flex;
            flex-direction: column;
            font-size: 12.5px;
            animation: fadeIn 0.12s ease-out forwards;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.9);
        }

        .chat-user {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.65);
            font-size: 11px;
            margin-bottom: 1px;
            letter-spacing: 0.3px;
        }

        .chat-msg {
            color: #ffffff;
            line-height: 1.35;
            word-wrap: break-word;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Comment Layout mirroring the left phone */
        .input-bar {
            padding: 12px 16px 16px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 4px); /* Pushes keyboard/input area clear of phone bottom bars */
        }

        .comment-pill-wrapper {
            width: 60%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 10px 16px;
        }

        .comment-pill-wrapper input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        .comment-pill-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .gift-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
            transition: transform 0.1s;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }
    </style>

            "I just saw the biggest dog I've ever seen in my life.", "I hate when you forget what you walked into a room for.", "I think autumn is definitely the best season for fashion.", 
            "I really want to learn how to play the guitar.", "My favorite snack right now is grapes with lime juice.", "I forgot to take the chicken out of the freezer.", 
            "Anyone else love listening to thunderstorm sounds to sleep?", "I’m trying to learn a new language but it’s so hard.", "I accidentally put my shirt on inside out today.", 
            "Clouds look incredibly fluffy today.", "I really need to get my oil changed.", "What's the best time of day to go for a run?", 
            "I just realized I haven't left the house in two days.", "I really love the smell of fresh cut grass.", "I need to find a good recipe for dinner tonight."
        ];

        const chatFillers = [" PogU!!!", " LFG!!!", " Hype!", " lmao", " KekW", " 🔥🔥🔥", " 💀💀💀", " monkaS", " NotLikeThis", " GIGACHAD"];

        const chatContainer = document.getElementById('chatContainer');
        const cameraBg = document.getElementById('cameraBg');
        const viewerElement = document.getElementById('liveViewers');
        const flipCamBtn = document.getElementById('flipCamBtn');
        
        let isUserScrolling = false;
        let currentFacingMode = "user"; // Start with front camera
        let currentStream = null;

        // --- CAMERA HARDWARE ENGINE WITH FLIP TRACKING ---
        async function setupCamera(facingMode) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode },
                    audio: false
                });
                currentStream = stream;
                cameraBg.srcObject = stream;
                
                if (facingMode === "user") {
                    cameraBg.classList.add('facing-user');
                } else {
                    cameraBg.classList.remove('facing-user');
                }
            } catch (err) {
                console.error("Camera access denied or hardware mode unavailable: ", err);
            }
        }
        
        setupCamera(currentFacingMode);

        flipCamBtn.addEventListener('click', () => {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            setupCamera(currentFacingMode);
        });

        // Track user manual scrolling metrics
        chatContainer.addEventListener('scroll', () => {
            const distanceFromBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;
            isUserScrolling = distanceFromBottom > 50; 
        });

        // --- CHAT ENGINE (4 MESSAGES PER SECOND) ---
        function pushMessage() {
            const user = chatUsernames[Math.floor(Math.random() * chatUsernames.length)];
            const phrase = chatTemplates[Math.floor(Math.random() * chatTemplates.length)];
            const filler = Math.random() > 0.4 ? chatFillers[Math.floor(Math.random() * chatFillers.length)] : "";

            const line = document.createElement('div');
            line.className = 'chat-line';

            line.innerHTML = `
                <span class="chat-user">${user}</span>
                <span class="chat-msg">${phrase}${filler}</span>
            `;
            
            chatContainer.appendChild(line);

            if (chatContainer.children.length > 50) {
                chatContainer.removeChild(chatContainer.firstChild);
            }

            if (!isUserScrolling) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }
        setInterval(pushMessage, 250);

        // --- DYNAMIC VIEWER COUNT FLUCTUATION ---
        let baseViewers = 70.3;
        function fluctuateViewers() {
            const shift = (Math.random() * 0.4) - 0.2; 
            baseViewers = Math.max(65.0, Math.min(78.0, baseViewers + shift));
            viewerElement.innerText = `${baseViewers.toFixed(1)}k viewers`;
        }
        setInterval(fluctuateViewers, 2500);

        // --- BACKGROUND SPEECH RECOGNITION LOOP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
    </script>
</body>
</html>
